name: Lint

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Setup pipx and poetry
      run: |
        python -m pip install --user pipx
        pipx install poetry

    - name: Install dependencies
      run: |
        poetry install
    
    - name: Check imports with isort
      run: |
        poetry run isort --check-only . || (echo "Run 'isort .' to fix" && exit 1)
    
    - name: Check formatting with black
      run: |
        poetry run black --check . || (echo "Run 'black .' to fix" && exit 1)
    
    - name: Lint with pylint
      run: |
        poetry run pylint drova_desktop_keenetic

    - name: Lint with mypy
      run: |
        poetry run mypy drova_desktop_keenetic
    
    - name: Upload pylint report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pylint-report-${{ matrix.python-version }}
        path: pylint-report.txt
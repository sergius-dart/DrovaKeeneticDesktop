services:
  rtmp-server:
    image: tiangolo/nginx-rtmp
    container_name: rtmp-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./recordings:/var/recordings
    command: >
      sh -c "
        mkdir -p /var/recordings &&
        chown www-data:www-data /var/recordings &&
        nginx -g 'daemon off;'
      "

  cleanup:
    image: alpine:latest
    container_name: rtmp-cleanup
    restart: unless-stopped
    volumes:
      - ./recordings:/var/recordings
      - ./cleanup.sh:/cleanup.sh:ro
    command: >
      sh -c "
        apk add --no-cache dcron findutils &&
        echo '0 2 * * * /cleanup.sh' > /var/spool/cron/crontabs/root &&
        crond -f -l 2
      "
